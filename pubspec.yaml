name: new_asset_management_app
description: Personal finance and asset management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (SQLite with type-safe query builder)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Navigation
  go_router: ^14.0.0

  # Charts
  fl_chart: ^0.68.0

  # UI helpers
  intl: ^0.20.0
  google_fonts: ^6.2.0

  # Secure password storage
  flutter_secure_storage: ^9.2.2

  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

  # Utility
  uuid: ^4.4.0
  collection: ^1.18.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
